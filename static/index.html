<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Home-Gym Personal Trainer - Tactical HUD for personalized workout planning">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>HOME-GYM // TACTICAL TRAINER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=phase3-onboarding-v1">
</head>
<body>

    <header id="topbar">
        <div class="topbar-left">
            <span class="logo-bracket">[</span>
            <span class="logo-text">HOME-GYM</span>
            <span class="logo-bracket">]</span>
            <span class="logo-separator">//</span>
            <span class="logo-sub" id="topbar-status">SYSTEM BOOT</span>
        </div>
        <div class="topbar-right">
            <span class="topbar-clock" id="topbar-clock">00:00:00</span>
            <button class="btn-reset" id="btn-reset" title="Reset profile">SYS.RESET</button>
        </div>
    </header>

    <section id="screen-register" class="screen active">
        <div class="screen-header">
            <span class="screen-tag">SCREEN_01</span>
            <h1>ATHLETE REGISTRATION</h1>
            <p class="screen-sub">Complete all fields to unlock tactical planning systems.</p>
        </div>

        <form id="onboarding-form" autocomplete="off">
            <div class="form-grid">
                <div class="form-field">
                    <label for="field-nickname">CALLSIGN</label>
                    <input type="text" id="field-nickname" name="nickname" placeholder="AlphaNumeric" maxlength="15" required>
                </div>
                <div class="form-field">
                    <label for="field-age">AGE_YRS</label>
                    <input type="number" id="field-age" name="age" placeholder="16-90" min="16" max="90" required>
                </div>
                <div class="form-field">
                    <label for="field-weight">MASS_KG</label>
                    <input type="number" id="field-weight" name="weight_kg" placeholder="40.0-200.0" step="0.1" min="40" max="200" required>
                </div>
                <div class="form-field">
                    <label for="field-height">HEIGHT_CM</label>
                    <input type="number" id="field-height" name="height_cm" placeholder="130-220" step="0.1" min="130" max="220" required>
                </div>

                <div class="form-field">
                    <label>EXP_LEVEL</label>
                    <div class="selector-group" id="sel-experience">
                        <button type="button" class="sel-btn" data-value="Beginner">BEGINNER</button>
                        <button type="button" class="sel-btn" data-value="Intermediate">INTER</button>
                        <button type="button" class="sel-btn" data-value="Advanced">ADVANCED</button>
                    </div>
                </div>
                <div class="form-field">
                    <label>TRAIN_TYPE</label>
                    <div class="selector-group" id="sel-preference">
                        <button type="button" class="sel-btn" data-value="Strength">STRENGTH</button>
                        <button type="button" class="sel-btn" data-value="Cardio">CARDIO</button>
                        <button type="button" class="sel-btn" data-value="Hybrid">HYBRID</button>
                    </div>
                </div>
                <div class="form-field">
                    <label>FREQ</label>
                    <div class="selector-group" id="sel-frequency">
                        <button type="button" class="sel-btn" data-value="1-2 times/week">1-2x</button>
                        <button type="button" class="sel-btn" data-value="3-5 times/week">3-5x</button>
                        <button type="button" class="sel-btn" data-value=">5 times/week">&gt;5x</button>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <label class="section-label">EQUIPMENT MANIFEST</label>
                <div class="checkbox-grid" id="equipment-grid">
                </div>
                <div class="form-field full-width">
                    <label for="field-custom-equipment">CUSTOM_EQUIPMENT</label>
                    <textarea id="field-custom-equipment" name="custom_equipment" rows="2" placeholder="e.g. walking pad, ab wheel, foam roller. Separate each item with a comma."></textarea>
                </div>
            </div>

            <div class="form-section">
                <label class="section-label">MISSION OBJECTIVES</label>
                <div class="checkbox-grid" id="objectives-grid">
                    <label class="chk-label"><input type="checkbox" value="run a 5k"><span class="chk-box"></span>RUN A 5K</label>
                    <label class="chk-label"><input type="checkbox" value="run a 10k"><span class="chk-box"></span>RUN A 10K</label>
                    <label class="chk-label"><input type="checkbox" value="60 minute ride"><span class="chk-box"></span>60 MIN RIDE</label>
                    <label class="chk-label"><input type="checkbox" value="healthy life"><span class="chk-box"></span>HEALTHY LIFE</label>
                    <label class="chk-label"><input type="checkbox" value="lose weight"><span class="chk-box"></span>LOSE WEIGHT</label>
                    <label class="chk-label"><input type="checkbox" value="gain muscle"><span class="chk-box"></span>GAIN MUSCLE</label>
                    <label class="chk-label"><input type="checkbox" value="10k steps a day"><span class="chk-box"></span>10K STEPS/DAY</label>
                </div>
                <div class="form-field full-width">
                    <label for="field-custom-objectives">CUSTOM_OBJECTIVES</label>
                    <textarea id="field-custom-objectives" name="custom_objectives" rows="2" placeholder="e.g. improve posture, train for hiking, rebuild cardio base. Separate each goal with a comma."></textarea>
                </div>
            </div>

            <div id="validation-feedback" class="feedback-box hidden"></div>

            <button type="submit" class="btn-primary" id="btn-register">
                <span class="btn-icon">></span> REGISTER ATHLETE
            </button>
        </form>
    </section>

    <section id="screen-session" class="screen">
        <div class="screen-header">
            <span class="screen-tag">SCREEN_02</span>
            <h1>SESSION BRIEFING</h1>
            <p class="screen-sub">Configure today's parameters. Overrides downscope your baseline profile.</p>
        </div>

        <div class="session-profile-bar" id="profile-bar"></div>

        <form id="session-form" autocomplete="off">
            <div class="form-grid">
                <div class="form-field">
                    <label for="field-energy">ENERGY_LVL</label>
                    <input type="range" id="field-energy" name="current_energy" min="1" max="10" value="7">
                    <span class="range-value" id="energy-val">7</span>
                </div>
                <div class="form-field">
                    <label for="field-time">TIME_AVAIL (min)</label>
                    <input type="number" id="field-time" name="time_available" placeholder="30-180" min="10" max="180" value="60">
                </div>
                <div class="form-field full-width">
                    <label for="field-goals">SESSION_GOALS</label>
                    <input type="text" id="field-goals" name="session_goals" placeholder="e.g. Focus on chest and back today">
                </div>
                <div class="form-field full-width">
                    <label for="field-injuries">LOCAL_INJURIES (comma-separated)</label>
                    <input type="text" id="field-injuries" name="local_injuries" placeholder="e.g. lower back, left shoulder">
                </div>
            </div>

            <button type="submit" class="btn-primary" id="btn-generate">
                <span class="btn-icon">></span> GENERATE OPERATION
            </button>
        </form>

        <div id="loading-indicator" class="loading hidden">
            <div class="scanner-line"></div>
            <span>COMPILING TACTICAL PLAN...</span>
        </div>
    </section>

    <section id="screen-workout" class="screen">
        <div class="screen-header">
            <span class="screen-tag">SCREEN_03</span>
            <h1 id="workout-title">OPERATION PLAN</h1>
            <p class="screen-sub" id="workout-meta"></p>
        </div>

        <div id="workout-content"></div>

        <div class="workout-actions">
            <button class="btn-secondary" id="btn-new-session">< NEW SESSION</button>
        </div>
    </section>

    <script src="/static/js/app.js?v=phase3-onboarding-v1"></script>
</body>
</html>
